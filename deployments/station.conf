server {
    server_name station.com;

    # Limite la taille maximale de la requête à 1G
    client_max_body_size 1G;

    # Fichiers statiques
    location /static/ {
        alias /var/www/station/static/;
    }

    location /media/ {
        alias /var/www/station/media/;
        expires 30d;
        access_log /var/log/nginx/media_access.log;
        autoindex on;
    }

    # Proxy vers le socket Unix de Daphne ou Gunicorn
    location / {
        proxy_pass http://unix:/var/www/station/station.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.tina-stock.com-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.tina-stock.com-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
